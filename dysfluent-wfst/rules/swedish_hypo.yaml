# Swedish phonological variation rules
# Converted from hypo_regex.pl (SAMPA notation → IPA)
#
# SAMPA → IPA symbol mapping used here:
#   @  → ə     I  → ɪ     E  → ɛ     Y  → y     2  → ø     9  → œ
#   }  → ʉ     U  → ʊ     O  → ɔ     A  → ɑ     N  → ŋ     S  → ʃ     C  → ç
#   {  → æ     j  → j
#   Long vowels: SAMPA X: → IPA Xː  (A: → ɑː, o: → oː, e: → eː, i: → iː, }: → ʉː, {: → æː)
#   Note: check all symbols against your CTC model's vocabulary with
#         processor.tokenizer.get_vocab(). The voiced velar stop may be
#         ɡ (U+0261) or g (U+0067) depending on the lexicon — adjust accordingly.
#
# Word-boundary context: many Perl rules are conditioned on # (word boundary).
# Without explicit boundary tokens in utterance-level phoneme sequences,
# those rules apply in any context. All rules use mode="opt" so both
# citation and variant forms survive in the lattice — over-application
# only adds variation paths rather than corrupting decoding.
#
# Whole-word function-word alternations (jag→ja/a, det→de/dett/rə, etc.)
# are best handled as multiple pronunciation entries in the lexicon FST
# rather than as cdrewrite rules. The function-word rules below cover only
# phonologically motivated sub-word alternations.

rules:

  # Unstressed vowel reduction (applied before stress-mark removal in orig.)
  # e/ɛ → ə when unstressed; without stress marks this applies broadly.
  - segment: e
    replacement: ə
    preceding_context: ""
    following_context: ""
  - segment: ɛ
    replacement: ə
    preceding_context: ""
    following_context: ""

  # h-deletion after sonorant (across word boundary and within word)
  # h → ∅ / r _ (har han, "r h" sequences)
  - segment: h
    replacement: ""
    preceding_context: r
    following_context: ""
  # h → ∅ / n _ (han har, Stenholm; WB and within-word both covered)
  - segment: h
    replacement: ""
    preceding_context: n
    following_context: ""

  # r-deletion before word-boundary + consonant: "där bilen" /dæːr biːlən/ → /dæː biːlən/
  # Without WB conditioning this is too broad; add per-consonant rules only
  # if you observe systematic WB r-deletion in your data.

  # Nasal place assimilation
  # n → m / _ [p b m]  (en bil → em bil, anpassa → ampassa)
  - segment: n
    replacement: m
    preceding_context: ""
    following_context: p
  - segment: n
    replacement: m
    preceding_context: ""
    following_context: b
  - segment: n
    replacement: m
    preceding_context: ""
    following_context: m
  # n → ŋ / _ [k ɡ]  (en klocka → eŋ klocka, enkom → eŋkom)
  - segment: n
    replacement: ŋ
    preceding_context: ""
    following_context: k
  - segment: n
    replacement: ŋ
    preceding_context: ""
    following_context: ɡ

  # n-deletion before ds (landskamp, tändsticka)
  - segment: n
    replacement: ""
    preceding_context: ""
    following_context: d s

  # d-deletion after n before r+vowel (hundra, mindre)
  - segment: d
    replacement: ""
    preceding_context: n
    following_context: r
  # d-deletion after n before vowel (gående) — preceding vowel constraint dropped
  - segment: d
    replacement: ""
    preceding_context: n
    following_context: ""

  # l-deletion before word-final ns (cykelns)
  - segment: l
    replacement: ""
    preceding_context: ""
    following_context: n s
  # l-deletion before word-final n (cykeln)
  - segment: l
    replacement: ""
    preceding_context: ""
    following_context: n

  # j-deletion between l and n (försäljning)
  - segment: j
    replacement: ""
    preceding_context: l
    following_context: n

  # r-deletion: ə _ m (Schleiermacher)
  - segment: r
    replacement: ""
    preceding_context: ə
    following_context: m

  # rl → l (svårhanterliga)
  - segment: r l
    replacement: l
    preceding_context: ""
    following_context: ""

  # rd → ∅ before rn (ordning: long-vowel + rd + rn → long-vowel + rn)
  # The Perl rule requires a preceding length mark (ː); if ː is a standalone
  # token in your model, add:  preceding_context: ː
  - segment: r d
    replacement: ""
    preceding_context: ""
    following_context: r n

  # vf → f (avfart: deletion of v before f)
  - segment: v
    replacement: ""
    preceding_context: ""
    following_context: f

  # Obstruent cluster simplifications
  # tb → p after long vowel (fotboll: ɑːtb → ɑːp)
  # Ideally conditioned on preceding long vowel; broadened here.
  - segment: t b
    replacement: p
    preceding_context: ""
    following_context: ""
  # b → ∅ / _ p (kubbpinne)
  - segment: b
    replacement: ""
    preceding_context: ""
    following_context: p
  # rd → ∅ / _ rt (badtunna: rd rt → rt)
  - segment: r d
    replacement: ""
    preceding_context: ""
    following_context: r t
  # d → ∅ / _ t (badtunna)
  - segment: d
    replacement: ""
    preceding_context: ""
    following_context: t
  # g → ∅ / _ k (lagkapten)
  - segment: ɡ
    replacement: ""
    preceding_context: ""
    following_context: k
  # st → ∅ / _ sk (kvastskaft: stsk → sk)
  - segment: s t
    replacement: ""
    preceding_context: ""
    following_context: s k
  # d → ∅ after long vowel before s (ombudsman)
  # t → ∅ after long vowel before s (justitie)
  # These should ideally require preceding ː; listed without that constraint.
  - segment: d
    replacement: ""
    preceding_context: ""
    following_context: s
  - segment: t
    replacement: ""
    preceding_context: ""
    following_context: s
  # k → ∅ / ɪ _ s ɔ (liksom)
  - segment: k
    replacement: ""
    preceding_context: ɪ
    following_context: s ɔ
  # p → ∅ / _ s y (psykolog: initial ps cluster)
  - segment: p
    replacement: ""
    preceding_context: ""
    following_context: s y

  # Noun endings
  # ʊ → ə / _ r (krattor: U r → ə r)
  - segment: ʊ
    replacement: ə
    preceding_context: ""
    following_context: r
  # t → ∅ / ə _ (bordet → borde, bordets → bordes)
  - segment: t
    replacement: ""
    preceding_context: ə
    following_context: ""

  # Verb endings
  # d ə → ∅ / a _ (lovade → lova: a d @ → a)
  - segment: d ə
    replacement: ""
    preceding_context: a
    following_context: ""

  # Adjective endings
  # ɡ → ∅ / ɪ _ (rolig, roliga, rolige: unstressed -ig)
  - segment: ɡ
    replacement: ""
    preceding_context: ɪ
    following_context: ""
  # k → ∅ / ɪ _ t (roligt)
  - segment: k
    replacement: ""
    preceding_context: ɪ
    following_context: t
  # k → ∅ / ɪ s _ t (magiskt)
  - segment: k
    replacement: ""
    preceding_context: ɪ s
    following_context: t
  # l → ∅ / ə _ t (enkelt)
  - segment: l
    replacement: ""
    preceding_context: ə
    following_context: t

  # Numerals
  # tio: iː ʊ → iː ə (tio, tiotusentals)
  - segment: ʊ
    replacement: ə
    preceding_context: iː
    following_context: ""
  # trettio/fyrtio: t i ʊ → t i ə
  - segment: ʊ
    replacement: ə
    preceding_context: i
    following_context: ""

  # Function words — phonologically motivated sub-word alternations.
  # Full word-form alternations (e.g. jag→a, det→rə) belong in the lexicon.

  # han/hon: word-initial h-dropping ("an", "on")
  - segment: h
    replacement: ""
    preceding_context: ""
    following_context: a n
  - segment: h
    replacement: ""
    preceding_context: ""
    following_context: ʊ n

  # är: æː r → eː / e / ə  (var. reductions of "är")
  - segment: æː r
    replacement: eː
    preceding_context: ""
    following_context: ""
  - segment: æː r
    replacement: e
    preceding_context: ""
    following_context: ""
  - segment: æː r
    replacement: ə
    preceding_context: ""
    following_context: ""
  # eː → e / ə  (de:, me:, etc.)
  - segment: eː
    replacement: e
    preceding_context: ""
    following_context: ""
  - segment: eː
    replacement: ə
    preceding_context: ""
    following_context: ""

  # att: a t → oː / ɔ  (att → å)
  - segment: a t
    replacement: oː
    preceding_context: ""
    following_context: ""
  - segment: a t
    replacement: ɔ
    preceding_context: ""
    following_context: ""
  # oː → ɔ  (also feeds att/och reduction)
  - segment: oː
    replacement: ɔ
    preceding_context: ""
    following_context: ""

  # och: ɔ k → oː / ɔ  (och → å)
  - segment: ɔ k
    replacement: oː
    preceding_context: ""
    following_context: ""
  - segment: ɔ k
    replacement: ɔ
    preceding_context: ""
    following_context: ""

  # med: eː d → eː / e / ə  (med → me)
  - segment: eː d
    replacement: eː
    preceding_context: ""
    following_context: ""
  - segment: eː d
    replacement: e
    preceding_context: ""
    following_context: ""
  - segment: eː d
    replacement: ə
    preceding_context: ""
    following_context: ""

  # till: t ɪ l → t ɪ / t ə  (till → ti/te)
  - segment: t ɪ l
    replacement: t ɪ
    preceding_context: ""
    following_context: ""
  - segment: t ɪ l
    replacement: t ə
    preceding_context: ""
    following_context: ""
  - segment: t ɪ
    replacement: t ə
    preceding_context: ""
    following_context: ""

  # från: f r oː n → f r oː  (från → frå: final n deletion)
  - segment: n
    replacement: ""
    preceding_context: oː
    following_context: ""

  # i: iː → ɪ  (preposition "i" reduced)
  - segment: iː
    replacement: ɪ
    preceding_context: ""
    following_context: ""

  # av: ɑː v → ɑː  (av → a: final v deletion)
  # Also: v → ∅ / ɑː _ C  (avdelning → adelning)
  - segment: v
    replacement: ""
    preceding_context: ɑː
    following_context: ""

  # bara: ɑː r a → ɑː  (bara → ba:) and → a (bara → ba)
  - segment: r a
    replacement: ""
    preceding_context: ɑː
    following_context: ""

  # sådan → sån: s oː d a n → s ɔ n
  - segment: oː d a
    replacement: ɔ
    preceding_context: s
    following_context: n

  # också → osså: ɔ k s ɔ → ɔ s ɔ  (k deletion)
  - segment: k
    replacement: ""
    preceding_context: ɔ
    following_context: s ɔ

  # vad: ɑː d → ɑː  (vad → va)
  - segment: d
    replacement: ""
    preceding_context: ɑː
    following_context: ""

  # det: d eː t → d eː / d e / d ə  (final t deletion and vowel reduction)
  - segment: t
    replacement: ""
    preceding_context: eː
    following_context: ""
  # dem: d e m → d ɔ m  (dem → dom)
  - segment: e m
    replacement: ɔ m
    preceding_context: d
    following_context: ""
