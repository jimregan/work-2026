# book_config.yaml
# Generated by parse_index.py — edit FILL_IN values before running fetch_text.py / align.py
#
# Workflow:
#   1. python parse_index.py --html index.html --out book_config.yaml
#   2. Edit this file: fill in whisperx_json paths, fix any text_url issues
#   3. python fetch_text.py --config book_config.yaml --outdir texts/
#   4. python align.py --config book_config.yaml --outdir aligned/

title: "Example Book Title"
source_html: "path/to/index.html"

# Top-level text links found on the LibriVox index page (for reference)
text_source_links:
  - label: "Read on Project Gutenberg"
    url: "https://www.gutenberg.org/files/XXXXX/XXXXX-h/XXXXX-h.htm"

# Per-chapter mapping.
# - audio_file:     the .mp3 you downloaded (informational only)
# - whisperx_json:  the .json WhisperX produced for that audio file
# - text_url:       URL of the chapter text (used by fetch_text.py)
# - text_file:      local path after fetch_text.py runs (auto-filled)
# - aligned_json:   output path after align.py runs (auto-filled)
#
# If one audio file covers multiple chapters, duplicate the whisperx_json
# entry and split the text_url/text_file per chapter — or concatenate the
# chapter texts and treat them as one chunk.
chapters:
  - chapter: "Chapter 1"
    audio_file: "audio/chapter_01.mp3"
    whisperx_json: "whisperx/chapter_01.json"
    text_url: "https://www.gutenberg.org/files/XXXXX/XXXXX-h/XXXXX-h.htm#chapter1"
    # text_file: filled in by fetch_text.py
    # aligned_json: filled in by align.py

  - chapter: "Chapter 2"
    audio_file: "audio/chapter_02.mp3"
    whisperx_json: "whisperx/chapter_02.json"
    text_url: "https://www.gutenberg.org/files/XXXXX/XXXXX-h/XXXXX-h.htm#chapter2"

  # Example: one audio file covers two short chapters — use same whisperx_json,
  # different text files (concatenate the texts manually or use an anchor URL).
  - chapter: "Chapter 3 + 4"
    audio_file: "audio/chapter_03_04.mp3"
    whisperx_json: "whisperx/chapter_03_04.json"
    text_url: "FILL_IN"
